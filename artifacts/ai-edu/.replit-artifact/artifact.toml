kind = "mobile"
previewPath = "/"
title = "AI Edu"
version = "1.0.0"
id = "artifacts/ai-edu"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20111

[services.development]
run = "pnpm --filter @workspace/ai-edu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-edu", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/ai-edu", "run", "serve" ]

[services.env]
PORT = "20111"
BASE_PATH = "/"
